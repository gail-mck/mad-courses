<head>
  <meta charset="UTF-8">
  <title>Madeira Course Catalog</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f7f5f5;
      font-family: Palatino, 'Palatino Linotype', 'Book Antiqua', serif;
    }

    #welcome-box {
      background: white;
      border-radius: 12px;
      padding: 3.5rem 4rem;
      max-width: 520px;
      width: 90%;
      text-align: center;
      border: 1px solid #f0e8e8;
    }

    #welcome-box h1 {
      color: #B90124;
      font-size: 2rem;
      margin: 0 0 0.5rem 0;
    }

    #welcome-box h2 {
      color: #333;
      font-size: 1.1rem;
      font-weight: normal;
      margin: 0 0 2rem 0;
    }

    #welcome-box p {
      color: #666;
      font-size: 1rem;
      line-height: 1.7;
      margin: 0 0 2.5rem 0;
    }

    #enter-btn {
      display: inline-block;
      background: none;
      border: 1px solid #B90124;
      border-radius: 8px;
      padding: 10px 28px;
      font-family: Palatino, 'Palatino Linotype', 'Book Antiqua', serif;
      font-size: 1rem;
      color: #B90124;
      cursor: pointer;
      text-decoration: none;
    }

    #enter-btn:hover {
      background-color: #fdf0f2;
    }
  </style>
</head>

<body>
  <div id="welcome-box">
    <h1>Madeira Course Catalog</h1>
    <h2>2025–2026</h2>
    <p>Browse all courses offered at Madeira and build your personalized academic plan. Drag courses into each grade year, track graduation requirements, and download your plan, all in one place!</p>
    <a href="index.html" id="enter-btn">Get started →</a>
  </div>
</body>
